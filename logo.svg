<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="goldArc" x1="10%" y1="95%" x2="90%" y2="5%">
      <stop offset="0%" stop-color="#8A6530"/>
      <stop offset="45%" stop-color="#EFCF9E"/>
      <stop offset="100%" stop-color="#D6A85F"/>
    </linearGradient>
    <linearGradient id="navyArc" x1="90%" y1="5%" x2="10%" y2="95%">
      <stop offset="0%" stop-color="#3C6183"/>
      <stop offset="45%" stop-color="#1E3F60"/>
      <stop offset="100%" stop-color="#0A1D34"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E2BC"/>
      <stop offset="100%" stop-color="#D3AC72"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F3153"/>
      <stop offset="100%" stop-color="#071523"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F4468"/>
      <stop offset="100%" stop-color="#10304F"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="13" fill="#0A1D34"/>

  <!-- Top gold arc: thicker, longer sweep, clear arrowhead pointing right -->
  <path d="M15.5 29
           C14 16.5, 25 8, 37.5 10.5
           C44.5 11.9, 49 17, 49 23"
        fill="none" stroke="url(#goldArc)" stroke-width="5.6" stroke-linecap="round"/>
  <path d="M42.5 15.8 L50.5 21.8 L43.8 28.6 Z" fill="url(#goldArc)"/>

  <!-- Bottom navy arc: mirror sweep, arrowhead pointing left -->
  <path d="M48.5 35
           C50 47.5, 39 56, 26.5 53.5
           C19.5 52.1, 15 47, 15 41"
        fill="none" stroke="url(#navyArc)" stroke-width="5.6" stroke-linecap="round"/>
  <path d="M21.5 48.2 L13.5 42.2 L20.2 35.4 Z" fill="url(#navyArc)"/>

  <!-- Center isometric cube, slightly larger for clarity -->
  <g transform="translate(32,32)">
    <path d="M0 -11 L10.5 -5.5 L0 0 L-10.5 -5.5 Z" fill="url(#cubeTop)"/>
    <path d="M-10.5 -5.5 L0 0 L0 11 L-10.5 5.5 Z" fill="url(#cubeLeft)"/>
    <path d="M10.5 -5.5 L0 0 L0 11 L10.5 5.5 Z" fill="url(#cubeRight)"/>
  </g>
</svg>
