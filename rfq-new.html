<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب عرض سعر جديد — سوق سينا</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<div>
  <main class="main" style="max-width:100%; padding:0;">
    <div class="topnav">
      <a href="buyer-dashboard.html" class="brand"><img src="logo.svg"><span>سوق سينا</span></a>
      <div class="nav-links" style="margin-right:auto;">
        <a href="buyer-dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>عودة للوحة التحكم</a>
      </div>
    </div>
    <div style="max-width:760px; padding:34px 40px;">
    <div class="topbar">
      <div>
        <h1>طلب عرض سعر جديد</h1>
        <p>صف احتياجك بدقة ليصلك أفضل تطابق من المصانع الموثّقة</p>
      </div>
    </div>

    <div class="stepper">
      <div class="step active"><div class="dot">١</div>تفاصيل المنتج</div>
      <div class="step-sep"></div>
      <div class="step"><div class="dot">٢</div>الكمية والجدول</div>
      <div class="step-sep"></div>
      <div class="step"><div class="dot">٣</div>مراجعة ونشر</div>
    </div>

    <form class="card" onsubmit="return submitRFQ(event)">
      <div class="field">
        <label>عنوان الطلب</label>
        <input type="text" placeholder="مثال: علب تغليف كرتونية مموجة" required>
      </div>

      <div class="field-row">
        <div class="field">
          <label>الفئة</label>
          <select required>
            <option value="">اختر الفئة</option>
            <option selected>تغليف الأغذية والمنتجات الاستهلاكية</option>
            <option>مواد بناء</option>
            <option>بلاستيك وصناعات مرنة</option>
          </select>
        </div>
        <div class="field">
          <label>الكمية المطلوبة</label>
          <input type="number" placeholder="50000" required>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>الموعد المطلوب للتسليم</label>
          <input type="date" required>
        </div>
        <div class="field">
          <label>الميزانية التقديرية (ر.س)</label>
          <input type="number" placeholder="اختياري">
        </div>
      </div>

      <div class="field">
        <label>مواصفات إضافية</label>
        <textarea rows="4" placeholder="الأبعاد، نوع الخامة، المطبوعات، معايير السلامة الغذائية..."></textarea>
      </div>

      <div class="field">
        <label>الأسواق المفضّلة للمصنع</label>
        <div style="display:flex; gap:10px;">
          <span class="badge badge-navy">السعودية</span>
          <span class="badge badge-navy">الإمارات</span>
          <span class="badge" style="border:1px dashed var(--line); color:var(--slate);">+ إضافة سوق</span>
        </div>
      </div>

      <div style="display:flex; gap:12px; margin-top:28px;">
        <button type="submit" class="btn btn-brass">نشر الطلب للمصانع الموثّقة</button>
        <a href="buyer-dashboard.html" class="btn">إلغاء</a>
      </div>
    </form>
    </div>
  </main>
</div>

<script>
  function submitRFQ(e){
    e.preventDefault();
    alert('تم نشر طلب عرض السعر. سيتم إشعارك عند وصول أول عرض من مصنع موثّق.');
    window.location.href = 'buyer-dashboard.html';
    return false;
  }
</script>
</body>
</html>
