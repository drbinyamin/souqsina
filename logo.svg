<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="goldArc" x1="15%" y1="85%" x2="85%" y2="15%">
      <stop offset="0%" stop-color="#9A7539"/>
      <stop offset="55%" stop-color="#E9C892"/>
      <stop offset="100%" stop-color="#D9AE6C"/>
    </linearGradient>
    <linearGradient id="navyArc" x1="85%" y1="15%" x2="15%" y2="85%">
      <stop offset="0%" stop-color="#33587D"/>
      <stop offset="55%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#0A1D34"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1D9AE"/>
      <stop offset="100%" stop-color="#C9A36B"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#122F4F"/>
      <stop offset="100%" stop-color="#081625"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C3E60"/>
      <stop offset="100%" stop-color="#0F2A4A"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="13" fill="#0A1D34"/>

  <!-- Top gold stroke of the S: starts lower-left, arcs up and over, ends pointing right -->
  <path d="M18 30
           C15 19, 24 10, 35 11
           C42 11.7, 46.5 16, 46.8 21.5"
        fill="none" stroke="url(#goldArc)" stroke-width="4.8" stroke-linecap="round"/>
  <path d="M41 15.3 L48 20.2 L42.4 26 Z" fill="url(#goldArc)"/>

  <!-- Bottom navy stroke of the S: mirror of the top, ends pointing left -->
  <path d="M46 34
           C49 45, 40 54, 29 53
           C22 52.3, 17.5 48, 17.2 42.5"
        fill="none" stroke="url(#navyArc)" stroke-width="4.8" stroke-linecap="round"/>
  <path d="M23 48.7 L16 43.8 L21.6 38 Z" fill="url(#navyArc)"/>

  <!-- Center isometric cube -->
  <g transform="translate(32,32)">
    <path d="M0 -10 L9.5 -5 L0 0 L-9.5 -5 Z" fill="url(#cubeTop)"/>
    <path d="M-9.5 -5 L0 0 L0 10 L-9.5 5 Z" fill="url(#cubeLeft)"/>
    <path d="M9.5 -5 L0 0 L0 10 L9.5 5 Z" fill="url(#cubeRight)"/>
  </g>
</svg>
